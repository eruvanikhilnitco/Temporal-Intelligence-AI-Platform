version: "3.8"

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: cortexflow-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Qdrant is expected to already be running as a separate container (qdrant_cf).
  # Uncomment below only if starting from scratch without an existing Qdrant instance.
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: cortexflow-qdrant
  #   restart: unless-stopped
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrant_data:/qdrant/storage

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
